<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="https://cdn.discordapp.com/icons/1498000979101093999/c96c547fbd94e68254d8335dadb2e437.webp?size=1280" type="image/webp">
    <title>Pulse CAD - Support Team</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #0a0a0a;
            color: #e0e0e0;
            min-height: 100vh;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 2rem;
            border-bottom: 1px solid #1a1a1a;
            background-color: #0d0d0d;
        }
        .logo-title {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .logo {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            overflow: hidden;
        }
        .logo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .header-right {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .user-display {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: #ccc;
            font-size: 0.9rem;
        }
        .user-avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background-color: #333;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: bold;
        }
        .back-link {
            color: #f0f0f0;
            text-decoration: none;
            font-weight: bold;
            padding: 0.5rem 1rem;
            border-radius: 4px;
            transition: background-color 0.3s ease;
            font-size: 0.9rem;
        }
        .back-link:hover {
            background-color: #3a3a3a;
        }
        .container {
            max-width: 1000px;
            margin: 2rem auto;
            padding: 0 1rem;
        }
        .container h1 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
            color: #fff;
        }
        .container > p {
            color: #666;
            margin-bottom: 2rem;
        }
        .filter-bar {
            display: flex;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
        }
        .filter-btn {
            padding: 0.5rem 1rem;
            border: 1px solid #333;
            border-radius: 6px;
            background-color: #141414;
            color: #aaa;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s;
        }
        .filter-btn.active {
            border-color: #4a90e2;
            color: #4a90e2;
            background-color: rgba(74, 144, 226, 0.1);
        }
        .filter-btn:hover {
            border-color: #4a90e2;
        }
        .ticket-card {
            background-color: #141414;
            border: 1px solid #1a1a1a;
            border-radius: 8px;
            padding: 1rem;
            margin-bottom: 0.75rem;
            cursor: pointer;
            transition: border-color 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .ticket-card:hover {
            border-color: #4a90e2;
        }
        .ticket-info {
            flex: 1;
        }
        .ticket-subject {
            font-weight: 600;
            color: #fff;
            margin-bottom: 0.25rem;
        }
        .ticket-meta {
            font-size: 0.8rem;
            color: #666;
        }
        .ticket-status {
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.75rem;
        }
        .ticket-status.open {
            background-color: rgba(76, 175, 80, 0.15);
            color: #4caf50;
        }
        .ticket-status.closed {
            background-color: rgba(255, 68, 68, 0.15);
            color: #ff4444;
        }
        .empty-state {
            text-align: center;
            color: #444;
            padding: 3rem;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo-title">
            <div class="logo"><img src="https://cdn.discordapp.com/icons/1498000979101093999/c96c547fbd94e68254d8335dadb2e437.webp?size=1280" alt="Logo"></div>
            <span>Pulse CAD - Support Team</span>
        </div>
        <div class="header-right">
            <div class="user-display">
                <div class="user-avatar" id="user-avatar">U</div>
                <span id="user-email">user@email.com</span>
            </div>
            <a href="dashboard.html" class="back-link">Back to Dashboard</a>
        </div>
    </header>

    <div class="container">
        <h1>Support Tickets</h1>
        <p>View and respond to user support tickets</p>

        <div class="filter-bar">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="open">Open</button>
            <button class="filter-btn" data-filter="closed">Closed</button>
        </div>

        <div id="tickets-list">
            <div class="empty-state">Loading tickets...</div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async function() {
            const supabaseUrl = 'https://sbgpcbdegyqzwkdympim.supabase.co';
            const supabaseAnonKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNiZ3BjYmRlZ3lxendrZHltcGltIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgzMjc2NTQsImV4cCI6MjA5MzkwMzY1NH0.hyYZTM-w0wbJAzZzygsDcgMjj8oMt5oP1ait3O0MxT8';
            const supabaseClient = supabase.createClient(supabaseUrl, supabaseAnonKey);

            const { data: { session } } = await supabaseClient.auth.getSession();
            let user = null;

            if (session) {
                user = session.user;
            } else {
                const localSession = JSON.parse(localStorage.getItem('pulse_session') || 'null');
                if (!localSession) {
                    window.location.href = 'login.html';
                    return;
                }
                user = { id: localSession.user_id, email: localSession.email };
            }

            const email = user.email;
            const displayName = email ? email.split('@')[0] : 'User';
            document.getElementById('user-email').textContent = displayName;
            document.getElementById('user-avatar').textContent = displayName.charAt(0).toUpperCase();

            let currentFilter = 'all';

            const filterBtns = document.querySelectorAll('.filter-btn');
            filterBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    filterBtns.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentFilter = btn.dataset.filter;
                    loadTickets();
                });
            });

            async function loadTickets() {
                let query = supabaseClient.from('support_tickets').select('*').order('created_at', { ascending: false });

                if (currentFilter === 'open') {
                    query = query.eq('status', 'open');
                } else if (currentFilter === 'closed') {
                    query = query.eq('status', 'closed');
                }

                const { data: tickets } = await query;

                const container = document.getElementById('tickets-list');
                if (!tickets || tickets.length === 0) {
                    container.innerHTML = '<div class="empty-state">No tickets found.</div>';
                    return;
                }

                container.innerHTML = tickets.map(t => `
                    <div class="ticket-card" onclick="window.location.href='ticket.html?id=${t.id}'">
                        <div class="ticket-info">
                            <div class="ticket-subject">${t.subject}</div>
                            <div class="ticket-meta">${t.email} • ${new Date(t.created_at).toLocaleString()} • ${t.description.substring(0, 80)}...</div>
                        </div>
                        <span class="ticket-status ${t.status}">${t.status.toUpperCase()}</span>
                    </div>
                `).join('');
            }

            await loadTickets();
            setInterval(loadTickets, 15000);
        });
    </script>
</body>
</html>
