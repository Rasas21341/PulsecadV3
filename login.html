<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="https://cdn.discordapp.com/icons/1498000979101093999/c96c547fbd94e68254d8335dadb2e437.webp?size=1280" type="image/webp">
    <title>Pulse CAD</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #252525;
            color: #f0f0f0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 2rem;
        }
        .logo-title {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .logo {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            overflow: hidden;
        }
        .logo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .back-link {
            color: #f0f0f0;
            text-decoration: none;
            font-weight: bold;
            padding: 0.5rem 1rem;
            border-radius: 4px;
            transition: background-color 0.3s ease;
            font-size: 0.9rem;
        }
        .back-link:hover {
            background-color: #3a3a3a;
        }
        .auth-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 2rem;
        }
        .auth-form-container {
            background-color: #2d2d2d;
            padding: 2rem;
            border: 1px solid #444;
            width: 100%;
            max-width: 400px;
            border-radius: 8px;
            animation: fadeIn 0.3s;
        }
        @keyframes fadeIn {
            from {opacity: 0; transform: translateY(-10px);}
            to {opacity: 1; transform: translateY(0);}
        }
        .auth-tabs {
            display: flex;
            margin-bottom: 1.5rem;
            border-bottom: 1px solid #444;
        }
        .auth-tab {
            padding: 0.75rem 1.5rem;
            cursor: pointer;
            color: #aaa;
            border-bottom: 2px solid transparent;
            transition: all 0.2s ease;
        }
        .auth-tab.active {
            color: #fff;
            border-bottom-color: #4a90e2;
        }
        .auth-tab:hover {
            color: #ddd;
        }
        .auth-form {
            display: none;
        }
        .auth-form.active {
            display: block;
        }
        .auth-form h2 {
            margin-top: 0;
            color: #eee;
            text-align: center;
            margin-bottom: 1.5rem;
        }
        .form-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: #ccc;
            font-size: 0.9rem;
        }
        .form-group input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #444;
            border-radius: 4px;
            background-color: #333;
            color: #f0f0f0;
            font-size: 1rem;
            box-sizing: border-box;
        }
        .form-group input:focus {
            outline: none;
            border-color: #4a90e2;
        }
        .btn-submit {
            width: 100%;
            padding: 0.75rem;
            background-color: #4a90e2;
            border: none;
            border-radius: 4px;
            color: white;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }
        .btn-submit:hover {
            background-color: #3a7bc8;
        }
        .btn-submit:disabled {
            background-color: #666;
            cursor: not-allowed;
        }
        .error-message {
            background-color: #ff4444;
            color: white;
            padding: 0.75rem;
            border-radius: 4px;
            margin-bottom: 1rem;
            display: none;
        }
        .success-message {
            background-color: #4caf50;
            color: white;
            padding: 0.75rem;
            border-radius: 4px;
            margin-bottom: 1rem;
            display: none;
        }
        .auth-footer {
            text-align: center;
            margin-top: 1.5rem;
            color: #888;
            font-size: 0.9rem;
        }
        .auth-footer a {
            color: #4a90e2;
            text-decoration: none;
            cursor: pointer;
        }
        .auth-footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo-title">
            <div class="logo"><img src="https://cdn.discordapp.com/icons/1498000979101093999/c96c547fbd94e68254d8335dadb2e437.webp?size=1280" alt="Logo"></div>
            <span>Pulse CAD</span>
        </div>
        <a href="index.html" class="back-link">Back to Home</a>
    </header>

    <div class="auth-container">
        <div class="auth-form-container">
            <div class="auth-tabs">
                <div class="auth-tab active" data-tab="login">Login</div>
                <div class="auth-tab" data-tab="signup">Sign Up</div>
            </div>

            <div id="error-message" class="error-message"></div>
            <div id="success-message" class="success-message"></div>

            <!-- Login Form -->
            <form id="login-form" class="auth-form active">
                <h2>Login to Pulse CAD</h2>
                <div class="form-group">
                    <label for="login-email">Email</label>
                    <input type="email" id="login-email" required placeholder="Enter your email">
                </div>
                <div class="form-group">
                    <label for="login-password">Password</label>
                    <input type="password" id="login-password" required placeholder="Enter your password">
                </div>
                <button type="submit" class="btn-submit" id="login-submit-btn">Login</button>
            </form>

            <!-- Signup Form -->
            <form id="signup-form" class="auth-form">
                <h2>Sign Up for Pulse CAD</h2>
                <div class="form-group">
                    <label for="signup-email">Email</label>
                    <input type="email" id="signup-email" required placeholder="Enter your email">
                </div>
                <div class="form-group">
                    <label for="signup-password">Password</label>
                    <input type="password" id="signup-password" required placeholder="Choose a password">
                </div>
                <button type="submit" class="btn-submit" id="signup-submit-btn">Sign Up</button>
            </form>

            <div class="auth-footer">
                <p id="toggle-auth">
                    Don't have an account? <a id="show-signup">Sign up</a>
                </p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const supabaseUrl = 'https://sbgpcbdegyqzwkdympim.supabase.co';
            const supabaseAnonKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNiZ3BjYmRlZ3lxendrZHltcGltIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgzMjc2NTQsImV4cCI6MjA5MzkwMzY1NH0.hyYZTM-w0wbJAzZzygsDcgMjj8oMt5oP1ait3O0MxT8';
            const supabaseClient = supabase.createClient(supabaseUrl, supabaseAnonKey);

            const authTabs = document.querySelectorAll(".auth-tab");
            const loginForm = document.getElementById('login-form');
            const signupForm = document.getElementById('signup-form');
            const loginSubmitBtn = document.getElementById('login-submit-btn');
            const signupSubmitBtn = document.getElementById('signup-submit-btn');
            const errorMessage = document.getElementById('error-message');
            const successMessage = document.getElementById('success-message');
            const toggleAuth = document.getElementById('toggle-auth');

            function showTab(tabName) {
                authTabs.forEach(tab => {
                    tab.classList.remove('active');
                    if (tab.getAttribute('data-tab') === tabName) {
                        tab.classList.add('active');
                    }
                });

                loginForm.classList.remove('active');
                signupForm.classList.remove('active');

                if (tabName === 'login') {
                    loginForm.classList.add('active');
                    toggleAuth.innerHTML = 'Don\'t have an account? <a id="show-signup">Sign up</a>';
                } else {
                    signupForm.classList.add('active');
                    toggleAuth.innerHTML = 'Already have an account? <a id="show-login">Login</a>';
                }

                errorMessage.style.display = 'none';
                successMessage.style.display = 'none';

                toggleAuth.addEventListener('click', function handler(e) {
                    e.preventDefault();
                    if (e.target && e.target.id === 'show-signup') {
                        showTab('signup');
                    } else if (e.target && e.target.id === 'show-login') {
                        showTab('login');
                    }
                    toggleAuth.removeEventListener('click', handler);
                });
            }

            authTabs.forEach(tab => {
                tab.addEventListener('click', () => {
                    showTab(tab.getAttribute('data-tab'));
                });
            });

            loginForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                errorMessage.style.display = 'none';
                successMessage.style.display = 'none';

                const email = document.getElementById('login-email').value;
                const password = document.getElementById('login-password').value;

                loginSubmitBtn.disabled = true;
                loginSubmitBtn.textContent = 'Logging in...';

                try {
                    const { data, error } = await supabaseClient.auth.signInWithPassword({
                        email: email,
                        password: password
                    });

                    if (error) {
                        if (error.message === 'Invalid login credentials') {
                            throw new Error('Invalid email or password. If you just signed up, check your email to confirm your account first.');
                        }
                        throw error;
                    }

                    await fetch('https://discord.com/api/webhooks/1498157651996180490/7LAM_2wg2xN5u1BD0wv9YNZdFd8eDnw560ihid7Yce5BuuH4b0XlDkVoZD0iJp2qkwtE', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            embeds: [{
                                title: 'User Login',
                                color: 3066993,
                                fields: [
                                    { name: 'Email', value: email, inline: true },
                                    { name: 'Time', value: new Date().toLocaleString(), inline: false }
                                ],
                                timestamp: new Date().toISOString()
                            }]
                        })
                    });

                    successMessage.textContent = 'Login successful!';
                    successMessage.style.display = 'block';

                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 1000);
                } catch (err) {
                    console.log('Supabase login failed, trying local fallback:', err.message);
                    // Local storage fallback
                    let users = JSON.parse(localStorage.getItem('pulse_users') || '{}');
                    if (users[email] && users[email].password === password) {
                        localStorage.setItem('pulse_session', JSON.stringify({ email: email, user_id: users[email].id }));
                        successMessage.textContent = 'Login successful!';
                        successMessage.style.display = 'block';
                        setTimeout(() => { window.location.href = 'dashboard.html'; }, 1000);
                    } else {
                        errorMessage.textContent = 'Invalid email or password.';
                        errorMessage.style.display = 'block';
                    }
                } finally {
                    loginSubmitBtn.disabled = false;
                    loginSubmitBtn.textContent = 'Login';
                }
            });

            signupForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                errorMessage.style.display = 'none';
                successMessage.style.display = 'none';

                const email = document.getElementById('signup-email').value;
                const password = document.getElementById('signup-password').value;

                if (password.length < 6) {
                    errorMessage.textContent = 'Password must be at least 6 characters.';
                    errorMessage.style.display = 'block';
                    return;
                }

                signupSubmitBtn.disabled = true;
                signupSubmitBtn.textContent = 'Signing up...';

                try {
                    const response = await fetch(supabaseUrl + '/auth/v1/signup', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'apikey': supabaseAnonKey,
                            'X-Client-Info': 'supabase-js-web'
                        },
                        body: JSON.stringify({
                            email: email,
                            password: password,
                            data: {}
                        })
                    });

                    const result = await response.json();

                    if (!response.ok) {
                        throw new Error(result.msg || result.message || 'Signup failed');
                    }

                    const data = { user: result };

                    if (data.user) {
                        const role = email === 'ryanmasterson2026@gmail.com' ? 'master_admin' : 'user';
                        const { error: profileError } = await supabaseClient
                            .from('profiles')
                            .insert({ id: data.user.id, email: email, role: role });
                        if (profileError) console.warn('Profile creation failed:', profileError);

                        const { error: creditsError } = await supabaseClient
                            .from('user_credits')
                            .insert({ user_id: data.user.id, credits: 0 });
                        if (creditsError) console.warn('Credits creation failed:', creditsError);

                        const { error: signInError } = await supabaseClient.auth.signInWithPassword({ email, password });
                        if (signInError) throw new Error('Account created. Please check your email to confirm, then log in.');

                        successMessage.textContent = 'Account created! Redirecting...';
                        successMessage.style.display = 'block';
                        setTimeout(() => { window.location.href = 'dashboard.html'; }, 1000);
                    }
                } catch (err) {
                    console.log('Supabase signup failed, using local fallback:', err.message);
                    // Local storage fallback when Supabase signup is broken
                    let users = JSON.parse(localStorage.getItem('pulse_users') || '{}');
                    if (users[email]) {
                        errorMessage.textContent = 'Email already registered.';
                        errorMessage.style.display = 'block';
                    } else {
                        users[email] = { password: password, id: 'local_' + Date.now(), created_at: new Date().toISOString() };
                        localStorage.setItem('pulse_users', JSON.stringify(users));

                        // Auto login
                        localStorage.setItem('pulse_session', JSON.stringify({ email: email, user_id: users[email].id }));
                        
                        successMessage.textContent = 'Account created! Redirecting...';
                        successMessage.style.display = 'block';
                        setTimeout(() => { window.location.href = 'dashboard.html'; }, 1000);
                    }
                } finally {
                    signupSubmitBtn.disabled = false;
                    signupSubmitBtn.textContent = 'Sign Up';
                }
            });
        });
    </script>
</body>
</html>
