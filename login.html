<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PulseCAD - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', Arial, Helvetica, sans-serif;
            background: linear-gradient(135deg, #0a0b0f 0%, #111216 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #e6e6e6;
            padding: 20px;
        }

        .login-container {
            background: #131519;
            border: 1px solid #23242a;
            border-radius: 20px;
            padding: 48px 36px 32px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 400px;
        }

        .logo-section {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo-section img {
            height: 40px;
            margin-bottom: 12px;
        }

        .logo-section h1 {
            font-size: 1.5rem;
            font-weight: 600;
            color: #fff;
            letter-spacing: -0.5px;
        }

        .logo-section p {
            font-size: 0.875rem;
            color: #7c8596;
            margin-top: 4px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 0.75rem;
            font-weight: 500;
            color: #9ca3af;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-wrapper input {
            width: 100%;
            padding: 14px 16px;
            background: #1a1d24;
            border: 1px solid #2a2d36;
            border-radius: 10px;
            font-size: 0.95rem;
            color: #e4e6eb;
            outline: none;
            transition: all 0.2s ease;
            box-sizing: border-box;
        }

        .input-wrapper input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .input-wrapper input::placeholder {
            color: #4b5563;
        }

        .remember-forgot {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .remember {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .remember input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: #3b82f6;
            cursor: pointer;
        }

        .remember label {
            font-size: 0.85rem;
            color: #9ca3af;
            cursor: pointer;
        }

        .forgot-link {
            color: #3b82f6;
            font-size: 0.85rem;
            text-decoration: none;
            font-weight: 500;
        }

        .forgot-link:hover {
            text-decoration: underline;
        }

        .login-btn {
            width: 100%;
            padding: 14px 24px;
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
            border: none;
            border-radius: 10px;
            font-size: 0.95rem;
            font-weight: 600;
            color: #ffffff;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-bottom: 24px;
        }

        .login-btn:hover {
            background: linear-gradient(135deg, #1d4ed8 0%, #1e40af 100%);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
        }

        .login-btn:disabled {
            background: #4b5563;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #23242a;
        }

        .divider span {
            font-size: 0.75rem;
            color: #7c8596;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .social-btn {
            width: 100%;
            padding: 12px;
            background: #1a1d24;
            border: 1px solid #2a2d36;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 0.9rem;
        }

        .social-btn:hover {
            border-color: #5865f2;
            background: rgba(88, 101, 242, 0.1);
        }

        .social-btn svg {
            width: 20px;
            height: 20px;
            color: #5865f2;
        }

        .social-btn span {
            font-weight: 500;
            color: #e6e6e6;
        }

        .login-footer {
            margin-top: 24px;
            text-align: center;
            font-size: 0.9rem;
            color: #7c8596;
        }

        .login-footer a {
            color: #3b82f6;
            text-decoration: none;
            font-weight: 500;
        }

        .login-footer a:hover {
            text-decoration: underline;
        }

        #loginMessage {
            margin-bottom: 20px;
            font-size: 0.875rem;
            text-align: center;
            min-height: 20px;
            padding: 8px 12px;
            border-radius: 8px;
            display: none;
        }

        #loginMessage:not(:empty) {
            display: block;
        }

        .error-message {
            color: #f87171;
            background: rgba(239, 68, 68, 0.1);
        }

        .success-message {
            color: #34d399;
            background: rgba(52, 211, 153, 0.1);
        }

        .back-link {
            position: absolute;
            top: -50px;
            left: 0;
            color: #7c8596;
            text-decoration: none;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: #fff;
        }

        @media (max-width: 480px) {
            .login-container {
                padding: 36px 24px 24px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo-section">
            <img src="https://cdn.discordapp.com/attachments/1474955372891607071/1498816803135033454/image.png?ex=69f3322c&is=69f1e0ac&hm=1969a8501b1babb87d368b7c89117808c24496f67f61cf67131121fce86949bc&" alt="PulseCAD Logo">
            <h1>Welcome Back</h1>
            <p>Sign in to access your account</p>
        </div>

         <form id="loginForm">
             <div class="form-group">
                 <label for="loginEmail">Email Address</label>
                 <div class="input-wrapper">
                     <input type="email" id="loginEmail" placeholder="you@example.com" required autocomplete="email" />
                 </div>
             </div>

             <div class="form-group">
                 <label for="loginPassword">Password</label>
                 <div class="input-wrapper">
                     <input type="password" id="loginPassword" placeholder="Enter your password" required autocomplete="current-password" />
                 </div>
             </div>

             <div class="remember-forgot">
                 <div class="remember">
                     <input type="checkbox" id="rememberMe" />
                     <label for="rememberMe">Remember me</label>
                 </div>
                 <a href="#" class="forgot-link" onclick="showForgotPassword(); return false;">Forgot password?</a>
             </div>

             <button type="submit" class="login-btn">Sign In</button>
             <div id="loginMessage"></div>
         </form>

        <div class="divider">
            <span>or continue with</span>
        </div>

        <button id="discordLoginBtn" class="social-btn">
            <svg viewBox="0 0 24 24" fill="currentColor">
                <path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/>
            </svg>
            <span>Sign in with Discord</span>
        </button>

        <div class="login-footer">
            Don't have an account? <a href="signup.html">Sign up</a>
        </div>
    </div>

      <script type="module">
          import { supabase } from './supabase.js';

          supabase.auth.getSession().then(function(result) {
              var session = result.data.session;
              if (session) {
                  console.log('User already logged in:', session.user.email);
              }
          });

          document.getElementById('loginForm').addEventListener('submit', function(e) {
              e.preventDefault();
              var email = document.getElementById('loginEmail').value;
              var password = document.getElementById('loginPassword').value;
              var messageEl = document.getElementById('loginMessage');
              var btn = document.querySelector('.login-btn');
              
              btn.textContent = 'Signing in...';
              btn.disabled = true;
              messageEl.textContent = '';
              messageEl.className = '';
              messageEl.style.display = 'block';

              supabase.auth.signInWithPassword({
                  email: email,
                  password: password
              }).then(function(result) {
                  var data = result.data;
                  var error = result.error;
                  
                  if (error) {
                      console.error('Login error:', error);
                      console.error('Error message:', error.message);
                      console.error('Error name:', error.name);
                      
                      messageEl.textContent = 'Incorrect email or password';
                      messageEl.className = 'error-message';
                      messageEl.style.display = 'block';
                      btn.textContent = 'Sign In';
                      btn.disabled = false;
                  } else {
                      console.log('Login successful:', data.user.email);
                      
                      // Check if profile exists, create if not
                      supabase.from('profiles').select('id').eq('id', data.user.id).single().then(function(profileResult) {
                          if (profileResult.error && profileResult.error.code === 'PGRST116') {
                              // Profile doesn't exist, create it
                              supabase.from('profiles').insert({
                                  id: data.user.id,
                                  email: data.user.email,
                                  username: data.user.email.split('@')[0], // Use part before @ as username
                                  created_at: new Date().toISOString()
                              }).then(function(insertResult) {
                                  if (insertResult.error) {
                                      console.error('Profile creation error:', insertResult.error);
                                  } else {
                                      console.log('Profile created for existing user');
                                  }
                              }).catch(function(insertErr) {
                                  console.error('Unexpected error creating profile:', insertErr);
                              });
                          } else if (profileResult.error) {
                              console.error('Error checking profile:', profileResult.error);
                          }
                          // Profile exists or created, continue with redirect
                      }).catch(function(selectErr) {
                          console.error('Unexpected error checking profile:', selectErr);
                          // Continue with redirect even if check fails
                      });
                      
                      messageEl.textContent = 'Login successful! Redirecting...';
                      messageEl.className = 'success-message';
                      window.location.href = 'blank.html';
                  }
              }).catch(function(err) {
                  console.error('Unexpected error:', err);
                  messageEl.textContent = 'Unable to connect. Please check your connection.';
                  messageEl.className = 'error-message';
                  messageEl.style.display = 'block';
                  btn.textContent = 'Sign In';
                  btn.disabled = false;
              });
          });

          document.getElementById('discordLoginBtn').addEventListener('click', function() {
              var messageEl = document.getElementById('loginMessage');
              var btn = document.getElementById('discordLoginBtn');
              
              messageEl.textContent = '';
              messageEl.className = '';
              btn.style.opacity = '0.7';
              btn.style.pointerEvents = 'none';

              var redirectUrl = window.location.origin + '/blank.html';

              supabase.auth.signInWithOAuth({
                  provider: 'discord',
                  options: { redirectTo: redirectUrl }
              }).then(function(result) {
                  var error = result.error;
                  if (error) {
                      console.error('Discord OAuth error:', error);
                      messageEl.textContent = error.message;
                      messageEl.className = 'error-message';
                      btn.style.opacity = '1';
                      btn.style.pointerEvents = 'auto';
                  }
                  // Note: Profile creation for Discord users will happen on redirect callback
                  // since we don't get the user data immediately in this flow
              }).catch(function(err) {
                  console.error('Unexpected error:', err);
                  messageEl.textContent = 'Unable to connect to Discord.';
                  messageEl.className = 'error-message';
                  btn.style.opacity = '1';
                  btn.style.pointerEvents = 'auto';
              });
          });

          function showForgotPassword() {
              var email = prompt('Enter your email address to receive a password reset link:');
              if (email && email.trim()) {
                  supabase.auth.resetPasswordForEmail(email, {
                      redirectTo: window.location.origin + '/login.html'
                  }).then(function(result) {
                      var error = result.error;
                      if (error) {
                          alert('Error: ' + error.message);
                      } else {
                          alert('Password reset email sent! Please check your inbox.');
                      }
                  });
              }
              return false;
          }
      </script>
</body>
</html>
