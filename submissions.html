<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Application Submissions - PulseCAD</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #ffffff;
            color: #1a202c;
            padding: 40px 24px;
        }

        .container {
            max-width: 960px;
            margin: 0 auto;
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            overflow: hidden;
        }

        th, td {
            text-align: left;
            padding: 12px 14px;
            border-bottom: 1px solid #f1f5f9;
            vertical-align: top;
        }

        th {
            background: #f8fafc;
            color: #64748b;
            font-weight: 600;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.03em;
        }

        tr:last-child td {
            border-bottom: none;
        }

        td {
            color: #334155;
            word-break: break-word;
        }

        .empty {
            color: #64748b;
            font-size: 14px;
            padding: 20px 0;
        }

        .back-btn {
            margin-bottom: 20px;
            padding: 8px 14px;
            border-radius: 10px;
            border: 1px solid #e2e8f0;
            background: #ffffff;
            color: #0f172a;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            display: inline-block;
        }

        .back-btn:hover {
            background: #f1f5f9;
        }
    </style>
</head>
<body>
    <div class="container">
        <button class="back-btn" id="backBtn">← Back</button>
        <h1>Application Submissions</h1>
        <div id="content"><div class="empty">Loading submissions...</div></div>
    </div>

    <script>
        document.getElementById("backBtn").addEventListener("click", () => window.close());
        const SUPABASE_URL = "https://zwdogalwbczdtvxvhrfd.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp3ZG9nYWx3YmN6ZHR2eHZocmZkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM2NTA2MjQsImV4cCI6MjA5OTIyNjYyNH0.baPVVTtW0d3FDC2pTd1P3d5aoIc2FZkaD-6bBvDPFWw";

        const localSupabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        const contentEl = document.getElementById("content");

        async function loadSubmissions() {
            try {
                const { data, error } = await localSupabase
                    .from("application_submissions")
                    .select("*")
                    .order("created_at", { ascending: false });

                if (error) {
                    contentEl.innerHTML = `<div class="empty">Failed to load submissions: ${error.message}</div>`;
                    return;
                }

                if (!Array.isArray(data) || data.length === 0) {
                    contentEl.innerHTML = `<div class="empty">No submissions found.</div>`;
                    return;
                }

                let html = `<table><tr><th>Email</th><th>Discord</th><th>Age</th><th>Time Zone</th><th>Active / Week</th><th>Prior Member</th><th>Copy / Paste</th><th>Submitted</th><th>Actions</th></tr>`;
                data.forEach((row) => {
                    const esc = (v) => (v == null ? "" : String(v).replace(/</g, "&lt;").replace(/>/g, "&gt;"));
                    const created = row.created_at ? new Date(row.created_at).toLocaleString() : "";
                    const cp = row.copy_paste_detected ? '<span style="color:#dc2626;font-weight:700;">Yes</span>' : '<span style="color:#166534;font-weight:700;">No</span>';
                    html += `<tr><td>${esc(row.email)}</td><td>${esc(row.discord)}</td><td>${esc(row.age)}</td><td>${esc(row.timezone)}</td><td>${esc(row.active)}</td><td>${esc(row.member)}</td><td>${cp}</td><td>${created}</td><td><button class="delete-btn" data-id="${row.id}">Delete</button></td></tr>`;
                });
                html += "</table>";
                contentEl.innerHTML = html;

                contentEl.querySelectorAll(".delete-btn").forEach((btn) => {
                    btn.addEventListener("click", async () => {
                        const id = btn.getAttribute("data-id");
                        if (!confirm("Delete this submission?")) return;
                        const { error } = await localSupabase
                            .from("application_submissions")
                            .delete()
                            .eq("id", id);
                        if (error) {
                            alert("Failed to delete: " + error.message);
                            return;
                        }
                        loadSubmissions();
                    });
                });
            } catch (err) {
                contentEl.innerHTML = `<div class="empty">An unexpected error occurred.</div>`;
                console.error(err);
            }
        }

        loadSubmissions();
    </script>
</body>
</html>
