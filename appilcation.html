<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Support Application - PulseCAD</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #ffffff;
            color: #1a202c;
            padding: 40px 24px;
        }

        .container {
            max-width: 560px;
            margin: 0 auto;
        }

        .app-head {
            font-size: 22px;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 20px;
        }

        .app-form label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #334155;
            margin: 16px 0 6px;
        }

        .app-form input {
            width: 100%;
            padding: 10px 12px;
            border-radius: 10px;
            border: 1px solid #e2e8f0;
            font-size: 14px;
            color: #1a202c;
        }

        .submit-btn {
            margin-top: 20px;
            width: 100%;
            text-align: center;
            padding: 10px 12px;
            border-radius: 10px;
            border: 1px solid #e2e8f0;
            background: #2563eb;
            color: #ffffff;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }

        .submit-btn:hover {
            background: #1d4ed8;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="app-head">Customer Support Application</div>
        <form class="app-form" id="appForm">
            <label>What is your Discord username and ID?</label>
            <input type="text" name="discord" />

            <label>How old are you?</label>
            <input type="text" name="age" />

            <label>What time zone are you in?</label>
            <input type="text" name="timezone" />

            <label>How active can you be each week?</label>
            <input type="text" name="active" />

            <label>Have you been a member of our community before? If so, for how long?</label>
            <input type="text" name="member" />

            <button type="submit" class="submit-btn" id="submitBtn">Submit</button>
        </form>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = "https://zwdogalwbczdtvxvhrfd.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp3ZG9nYWx3YmN6ZHR2eHZocmZkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM2NTA2MjQsImV4cCI6MjA5OTIyNjYyNH0.baPVVTtW0d3FDC2pTd1P3d5aoIc2FZkaD-6bBvDPFWw";

        const localSupabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const form = document.getElementById("appForm");
        if (form) {
            form.addEventListener("submit", async (e) => {
                e.preventDefault();
                const btn = document.getElementById("submitBtn");
                if (btn) {
                    btn.disabled = true;
                    btn.textContent = "Submitting...";
                }

                const payload = {
                    discord: form.discord.value.trim(),
                    age: form.age.value.trim(),
                    timezone: form.timezone.value.trim(),
                    active: form.active.value.trim(),
                    member: form.member.value.trim()
                };

                const { error } = await localSupabase
                    .from("application_submissions")
                    .insert([payload]);

                if (error) {
                    alert("Failed to submit: " + error.message);
                    if (btn) {
                        btn.disabled = false;
                        btn.textContent = "Submit";
                    }
                    return;
                }

                if (btn) {
                    btn.textContent = "Submitted";
                }
                alert("Application submitted.");
                form.reset();
            });
        }
    </script>
</body>
</html>
