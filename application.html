<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Support Application - PulseCAD</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #ffffff;
            color: #1a202c;
            padding: 40px 24px;
        }

        .container {
            max-width: 560px;
            margin: 0 auto;
        }

        .app-head {
            font-size: 22px;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 20px;
        }

        .app-form label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #334155;
            margin-bottom: 8px;
        }

        .app-form .field-oval {
            border: 1px solid #e2e8f0;
            border-radius: 999px;
            padding: 12px 16px;
            margin-bottom: 16px;
            background: #ffffff;
        }

        .app-form .field-oval input {
            width: 100%;
            border: none;
            background: transparent;
            padding: 0;
            font-size: 14px;
            color: #1a202c;
            outline: none;
        }

        .app-form .field-oval input:focus {
            outline: none;
        }

        .submit-btn {
            margin-top: 8px;
            width: 100%;
            text-align: center;
            padding: 10px 12px;
            border-radius: 999px;
            border: 1px solid #e2e8f0;
            background: #2563eb;
            color: #ffffff;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }

        .submit-btn:hover {
            background: #1d4ed8;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="app-head">Customer Support Application</div>
        <form class="app-form" id="appForm">
            <label>Email <span style="color:#f87171;">*</span></label>
            <div class="field-oval"><input type="email" name="email" placeholder="you@example.com" required /></div>

            <label>What is your Discord username and ID?</label>
            <div class="field-oval"><input type="text" name="discord" /></div>

            <label>How old are you?</label>
            <div class="field-oval"><input type="text" name="age" /></div>

            <label>What time zone are you in?</label>
            <div class="field-oval"><input type="text" name="timezone" /></div>

            <label>How active can you be each week?</label>
            <div class="field-oval"><input type="text" name="active" /></div>

            <label>Have you been a member of our community before? If so, for how long?</label>
            <div class="field-oval"><input type="text" name="member" /></div>

            <button type="submit" class="submit-btn" id="submitBtn">Submit</button>
        </form>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = "https://zwdogalwbczdtvxvhrfd.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp3ZG9nYWx3YmN6ZHR2eHZocmZkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM2NTA2MjQsImV4cCI6MjA5OTIyNjYyNH0.baPVVTtW0d3FDC2pTd1P3d5aoIc2FZkaD-6bBvDPFWw";

        const localSupabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        const form = document.getElementById("appForm");

        if (form) {
            let copyPasteDetected = false;

            (async () => {
                const emailInput = form.email;
                if (!emailInput) return;
                if (!localSupabase) return;
                try {
                    const { data: { user } } = await localSupabase.auth.getUser();
                    if (user?.email) {
                        emailInput.value = user.email;
                    }
                } catch (err) {
                    console.error("Failed to autofill email:", err);
                }
            })();

            form.addEventListener("paste", (e) => {
                e.preventDefault();
                copyPasteDetected = true;
            });

            form.addEventListener("copy", (e) => {
                e.preventDefault();
                copyPasteDetected = true;
            });

            form.addEventListener("cut", (e) => {
                e.preventDefault();
                copyPasteDetected = true;
            });

            form.addEventListener("contextmenu", (e) => {
                e.preventDefault();
            });

            form.addEventListener("keydown", (e) => {
                if ((e.ctrlKey || e.metaKey) && (e.key === "c" || e.key === "v" || e.key === "x")) {
                    e.preventDefault();
                    copyPasteDetected = true;
                }
            });

            form.addEventListener("submit", async (e) => {
                e.preventDefault();

                if (!localSupabase) {
                    alert("You must be logged in to submit an application.");
                    return;
                }

                const { data: { user } } = await localSupabase.auth.getUser();
                if (!user) {
                    alert("You must be logged in to submit an application.");
                    if (btn) {
                        btn.disabled = false;
                        btn.textContent = "Submit";
                    }
                    return;
                }

                const btn = document.getElementById("submitBtn");
                if (btn) {
                    btn.disabled = true;
                    btn.textContent = "Submitting...";
                }

                const payload = {
                    email: user.email || form.email.value.trim(),
                    discord: form.discord.value.trim(),
                    age: form.age.value.trim(),
                    timezone: form.timezone.value.trim(),
                    active: form.active.value.trim(),
                    member: form.member.value.trim(),
                    copy_paste_detected: copyPasteDetected
                };

                const { error } = await localSupabase
                    .from("application_submissions")
                    .insert([payload]);

                if (error) {
                    alert("Failed to submit: " + error.message);
                    if (btn) {
                        btn.disabled = false;
                        btn.textContent = "Submit";
                    }
                    return;
                }

                if (btn) {
                    btn.textContent = "Submitted";
                }
                alert("Application submitted.");
                form.reset();
            });
        }
    </script>
</body>
</html>
