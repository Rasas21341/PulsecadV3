<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="https://cdn.discordapp.com/icons/1498000979101093999/c96c547fbd94e68254d8335dadb2e437.webp?size=1280" type="image/webp">
    <title>Pulse CAD - 404</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #0a0a0a; color: #e0e0e0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .container { text-align: center; padding: 2rem; }
        .error-code { font-size: 8rem; font-weight: 800; color: #4a90e2; margin-bottom: 1rem; }
        .error-title { font-size: 2rem; color: #fff; margin-bottom: 0.5rem; }
        .error-desc { color: #666; margin-bottom: 1.5rem; }
        .btn { display: inline-block; background-color: #4a90e2; color: white; padding: 0.75rem 2rem; border-radius: 8px; text-decoration: none; font-weight: bold; transition: background-color 0.2s; }
        .btn:hover { background-color: #3a7bc8; }
    </style>
</head>
<body>
    <div class="container">
        <div class="error-code">404</div>
        <h1 class="error-title">Page not found</h1>
        <p class="error-desc">The page you are looking for does not exist.</p>
        <a href="index.html" class="btn">Go Home</a>
    </div>
</body>
</html>
