<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Community - PulseCAD</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #ffffff;
            color: #1a202c;
            padding: 40px 24px;
        }

        .container {
            max-width: 640px;
            margin: 0 auto;
        }

        .back-btn {
            margin-bottom: 20px;
            padding: 8px 14px;
            border-radius: 10px;
            border: 1px solid #e2e8f0;
            background: #ffffff;
            color: #0f172a;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }

        .back-btn:hover {
            background: #f1f5f9;
        }

        .community-name {
            font-size: 26px;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 8px;
        }

        .community-meta {
            font-size: 14px;
            color: #64748b;
            margin-bottom: 16px;
        }

        .badges {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .badge {
            padding: 6px 12px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 700;
        }

        .badge-verified {
            color: #ffffff;
            background: #2563eb;
            border: 1px solid #2563eb;
        }

        .badge-suspended {
            color: #ffffff;
            background: #dc2626;
            border: 1px solid #dc2626;
        }

        .badge-joined {
            color: #166534;
            background: #f0fdf4;
            border: 1px solid #bbf7d0;
        }

        .community-description {
            font-size: 15px;
            color: #334155;
            line-height: 1.6;
            border-top: 1px solid #f1f5f9;
            padding-top: 20px;
        }

        .community-screen {
            margin-top: 24px;
            min-height: 280px;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            background: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 14px;
        }

        .role-btn {
            width: 220px;
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            background: #f8fafc;
            color: #0f172a;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
        }

        .role-btn:hover {
            background: #f1f5f9;
        }

        .suspended-note {
            color: #dc2626;
            font-weight: 700;
            margin-bottom: 16px;
        }

        .empty {
            color: #64748b;
            font-size: 14px;
            padding: 20px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <button class="back-btn" id="backBtn">← Back</button>
        <div id="content"><div class="empty">Loading community...</div></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = "https://zwdogalwbczdtvxvhrfd.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp3ZG9nYWx3YmN6ZHR2eHZocmZkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM2NTA2MjQsImV4cCI6MjA5OTIyNjYyNH0.baPVVTtW0d3FDC2pTd1P3d5aoIc2FZkaD-6bBvDPFWw";

        const localSupabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        const contentEl = document.getElementById("content");

        document.getElementById("backBtn").addEventListener("click", () => window.close());

        async function loadCommunity() {
            const params = new URLSearchParams(window.location.search);
            const id = params.get("id");
            if (!id) {
                contentEl.innerHTML = `<div class="empty">No community specified.</div>`;
                return;
            }

            const { data, error } = await localSupabase
                .from("communities")
                .select("*")
                .eq("id", id)
                .maybeSingle();

            if (error) {
                contentEl.innerHTML = `<div class="empty">Failed to load community: ${error.message}</div>`;
                return;
            }
            if (!data) {
                contentEl.innerHTML = `<div class="empty">Community not found.</div>`;
                return;
            }

            const name = (data.name || "N/A").replace(/</g, "&lt;").replace(/>/g, "&gt;");
            const description = (data.description || "No description.").replace(/</g, "&lt;").replace(/>/g, "&gt;");
            const creator = (data.creator_email || "Unknown").replace(/</g, "&lt;").replace(/>/g, "&gt;");
            const created = data.created_at ? new Date(data.created_at).toLocaleString() : "";
            const suspended = !!data.suspended;
            const joined = !!data.joined;
            const verified = !!data.verification_requested;

            const badges = [];
            if (verified) badges.push('<span class="badge badge-verified">Verified</span>');
            if (suspended) badges.push('<span class="badge badge-suspended">Suspended</span>');
            if (joined) badges.push('<span class="badge badge-joined">Joined</span>');

            contentEl.innerHTML = `
                <div class="community-screen">
                    <button type="button" class="role-btn" data-role="Police">Police</button>
                    <button type="button" class="role-btn" data-role="Civilian">Civilian</button>
                    <button type="button" class="role-btn" data-role="Admin">Admin</button>
                </div>
            `;

            contentEl.querySelectorAll(".role-btn").forEach((btn) => {
                btn.addEventListener("click", () => {
                    const role = btn.getAttribute("data-role");
                    if (role === "Police") {
                        window.open("police.html", "_blank");
                    } else if (role === "Civilian") {
                        window.open("civilian.html", "_blank");
                    } else {
                        alert("Selected role: " + role);
                    }
                });
            });
        }

        loadCommunity();
    </script>
</body>
</html>
