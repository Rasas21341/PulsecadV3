<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="https://cdn.discordapp.com/icons/1498000979101093999/c96c547fbd94e68254d8335dadb2e437.webp?size=1280" type="image/webp">
    <title>Pulse CAD - Support</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #0a0a0a;
            color: #e0e0e0;
            min-height: 100vh;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 2rem;
            border-bottom: 1px solid #1a1a1a;
            background-color: #0d0d0d;
        }
        .logo-title {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .logo {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            overflow: hidden;
        }
        .logo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .header-right {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .user-display {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: #ccc;
            font-size: 0.9rem;
        }
        .user-avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background-color: #333;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: bold;
        }
        .back-link {
            color: #f0f0f0;
            text-decoration: none;
            font-weight: bold;
            padding: 0.5rem 1rem;
            border-radius: 4px;
            transition: background-color 0.3s ease;
            font-size: 0.9rem;
        }
        .back-link:hover {
            background-color: #3a3a3a;
        }
        .support-container {
            max-width: 600px;
            margin: 3rem auto;
            padding: 0 1rem;
        }
        .support-container h1 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
            color: #fff;
        }
        .support-container p {
            color: #666;
            margin-bottom: 2rem;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: #ccc;
            font-size: 0.9rem;
        }
        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #444;
            border-radius: 4px;
            background-color: #1a1a1a;
            color: #f0f0f0;
            font-size: 1rem;
            box-sizing: border-box;
        }
        .form-group textarea {
            min-height: 150px;
            resize: vertical;
            font-family: inherit;
        }
        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: #4a90e2;
        }
        .btn-submit {
            width: 100%;
            padding: 0.75rem;
            background-color: #4a90e2;
            border: none;
            border-radius: 4px;
            color: white;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }
        .btn-submit:hover {
            background-color: #3a7bc8;
        }
        .btn-submit:disabled {
            background-color: #666;
            cursor: not-allowed;
        }
        .my-tickets {
            margin-top: 3rem;
        }
        .my-tickets h2 {
            font-size: 1.2rem;
            margin-bottom: 1rem;
            color: #fff;
        }
        .ticket-card {
            background-color: #141414;
            border: 1px solid #1a1a1a;
            border-radius: 8px;
            padding: 1rem;
            margin-bottom: 0.75rem;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: border-color 0.2s;
        }
        .ticket-card:hover {
            border-color: #4a90e2;
        }
        .ticket-subject {
            font-weight: 600;
            color: #fff;
        }
        .ticket-date {
            font-size: 0.8rem;
            color: #666;
        }
        .ticket-status {
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.75rem;
        }
        .ticket-status.open {
            background-color: rgba(76, 175, 80, 0.15);
            color: #4caf50;
        }
        .ticket-status.closed {
            background-color: rgba(255, 68, 68, 0.15);
            color: #ff4444;
        }
        .error-message,
        .success-message {
            padding: 0.75rem;
            border-radius: 4px;
            margin-bottom: 1rem;
            display: none;
        }
        .error-message {
            background-color: #ff4444;
            color: white;
        }
        .success-message {
            background-color: #4caf50;
            color: white;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo-title">
            <div class="logo"><img src="https://cdn.discordapp.com/icons/1498000979101093999/c96c547fbd94e68254d8335dadb2e437.webp?size=1280" alt="Logo"></div>
            <span>Pulse CAD - Support</span>
        </div>
        <div class="header-right">
            <div class="user-display">
                <div class="user-avatar" id="user-avatar">U</div>
                <span id="user-email">user@email.com</span>
            </div>
            <a href="dashboard.html" class="back-link">Back to Dashboard</a>
        </div>
    </header>

    <div class="support-container">
        <h1>Open a Support Ticket</h1>
        <p>Describe your issue and our support team will get back to you.</p>

        <div id="error-message" class="error-message"></div>
        <div id="success-message" class="success-message"></div>

        <form id="ticket-form">
            <div class="form-group">
                <label for="ticket-email">Your Email</label>
                <input type="email" id="ticket-email" required placeholder="your@email.com">
            </div>
            <div class="form-group">
                <label for="ticket-subject">Subject</label>
                <input type="text" id="ticket-subject" required placeholder="Brief description of your issue">
            </div>
            <div class="form-group">
                <label for="ticket-description">Description</label>
                <textarea id="ticket-description" required placeholder="Describe your issue in detail..."></textarea>
            </div>
            <button type="submit" class="btn-submit" id="submit-btn">Open Ticket</button>
        </form>

        <div class="my-tickets">
            <h2>My Tickets</h2>
            <div id="my-tickets-list">
                <p style="color: #444; font-size: 0.85rem;">No tickets yet.</p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async function() {
            const supabaseUrl = 'https://sbgpcbdegyqzwkdympim.supabase.co';
            const supabaseAnonKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNiZ3BjYmRlZ3lxendrZHltcGltIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgzMjc2NTQsImV4cCI6MjA5MzkwMzY1NH0.hyYZTM-w0wbJAzZzygsDcgMjj8oMt5oP1ait3O0MxT8';
            const supabaseClient = supabase.createClient(supabaseUrl, supabaseAnonKey);

            const { data: { session } } = await supabaseClient.auth.getSession();
            let user = null;

            if (session) {
                user = session.user;
            } else {
                const localSession = JSON.parse(localStorage.getItem('pulse_session') || 'null');
                if (!localSession) {
                    window.location.href = 'login.html';
                    return;
                }
                user = { id: localSession.user_id, email: localSession.email };
            }

            const email = user.email;
            const displayName = email ? email.split('@')[0] : 'User';
            document.getElementById('user-email').textContent = displayName;
            document.getElementById('user-avatar').textContent = displayName.charAt(0).toUpperCase();
            document.getElementById('ticket-email').value = email;

            const ticketForm = document.getElementById('ticket-form');
            const submitBtn = document.getElementById('submit-btn');
            const errorMessage = document.getElementById('error-message');
            const successMessage = document.getElementById('success-message');

            ticketForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                errorMessage.style.display = 'none';
                successMessage.style.display = 'none';

                const email = document.getElementById('ticket-email').value.trim();
                const subject = document.getElementById('ticket-subject').value.trim();
                const description = document.getElementById('ticket-description').value.trim();

                if (!email || !subject || !description) {
                    errorMessage.textContent = 'Please fill in all fields.';
                    errorMessage.style.display = 'block';
                    return;
                }

                submitBtn.disabled = true;
                submitBtn.textContent = 'Opening ticket...';

                try {
                    const { data: ticket, error: ticketError } = await supabaseClient
                        .from('support_tickets')
                        .insert({
                            user_id: user.id,
                            email: email,
                            subject: subject,
                            description: description,
                            status: 'open'
                        })
                        .select()
                        .single();

                    if (ticketError) throw ticketError;

                    // Send Discord webhook notification
                    try {
                        await fetch('https://discord.com/api/webhooks/1502691442546442312/nF7pYA9rEpHp5mdKn6kn5OBXg5xzb7JJZqs-dFhJ6eYxPITKYoTSCxObB1zOjqwiNjoQ', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                content: '<@&1498794557129752749>',
                                embeds: [{
                                    title: 'New Support Ticket',
                                    color: 4915330,
                                    fields: [
                                        { name: 'Ticket ID', value: ticket.id.substring(0, 8), inline: true },
                                        { name: 'Email', value: email, inline: true },
                                        { name: 'Subject', value: subject, inline: false },
                                        { name: 'Description', value: description.substring(0, 500), inline: false }
                                    ],
                                    timestamp: new Date().toISOString()
                                }]
                            })
                        });
                    } catch (webhookError) {
                        console.warn('Discord webhook failed:', webhookError);
                    }

                    successMessage.textContent = 'Ticket opened! Redirecting to ticket view...';
                    successMessage.style.display = 'block';
                    setTimeout(() => { window.location.href = 'ticket.html?id=' + ticket.id; }, 1500);

                } catch (err) {
                    console.error('Error creating ticket:', err);
                    errorMessage.textContent = 'Failed to open ticket. Please try again.';
                    errorMessage.style.display = 'block';
                } finally {
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Open Ticket';
                }
            });

            async function loadMyTickets() {
                const { data: tickets } = await supabaseClient
                    .from('support_tickets')
                    .select('*')
                    .eq('user_id', user.id)
                    .order('created_at', { ascending: false });

                const container = document.getElementById('my-tickets-list');
                if (!tickets || tickets.length === 0) {
                    container.innerHTML = '<p style="color: #444; font-size: 0.85rem;">No tickets yet.</p>';
                    return;
                }
                container.innerHTML = tickets.map(t => `
                    <div class="ticket-card" onclick="window.location.href='ticket.html?id=${t.id}'">
                        <div>
                            <div class="ticket-subject">${t.subject}</div>
                            <div class="ticket-date">${new Date(t.created_at).toLocaleDateString()}</div>
                        </div>
                        <span class="ticket-status ${t.status}">${t.status.toUpperCase()}</span>
                    </div>
                `).join('');
            }

            await loadMyTickets();
        });
    </script>
</body>
</html>
